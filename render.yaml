services:
  # ============================================================
  # BACKEND SERVICE
  # ============================================================
  - type: web
    name: jobradar-backend
    runtime: docker
    plan: starter
    region: oregon
    
    # Correct Monorepo Pathing:
    rootDir: backend
    dockerContext: .
    dockerfilePath: Dockerfile.prod

    envVars:
      - key: DEBUG
        value: "False"
      - key: JWT_SECRET
        generateValue: true
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: https://jobradar-mocha.vercel.app
      
      # Database
      - key: DATABASE_URL
        fromDatabase:
          name: jobradar-db
          property: connectionString
      
      # Aiven Redis (Production)
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PASSWORD
        sync: false
      - key: REDIS_PORT
        value: "25164"
      - key: REDIS_USERNAME
        value: "default"
      - key: REDIS_SSL
        value: "True"
      - key: REDIS_SSL_CA_CERT
        value: "certs/ca.pem"
      - key: REDIS_SSL_CERT
        value: "certs/service.cert"
      - key: REDIS_SSL_KEY
        value: "certs/service.key"
      
      # Redis URL for Celery
      - key: REDIS_URL
        sync: false
      - key: CELERY_BROKER_URL
        sync: false
      - key: CELERY_RESULT_BACKEND
        sync: false

  # ============================================================
  # FRONTEND SERVICE
  # ============================================================
  - type: web
    name: jobradar-frontend
    runtime: docker
    plan: starter
    region: oregon
    
    # Correct Monorepo Pathing:
    rootDir: frontend
    dockerContext: .
    dockerfilePath: Dockerfile

    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://jobradar-backend-qew1.onrender.com

# ============================================================
# DATABASES
# ============================================================
databases:
  - name: jobradar-db
    region: oregon
    plan: starter
